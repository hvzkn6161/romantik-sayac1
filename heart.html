<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalbime Dokun ❤️</title>

    <link rel="stylesheet" href="heart.css">
</head>

<body>

    <h1>❤️ Kalbime Dokun ❤️</h1>

    <div id="heart">❤️</div>
    <div id="heartParticles"></div>

    <p id="counter">0 / 100</p>
    
    <p id="message">💗 Kalbime ilk dokunuşun...</p>

    <div id="finalMessage" class="hidden">

    <div class="final-box">

    <div class="envelope" id="envelope">

        <div class="envelope-back"></div>

        <div class="envelope-letter">

    <div id="letterPaper">

        <h3>Canım Aşkım ❤️</h3>

        <p id="letterText">
Bu satır test için yazıldı.
</p>

    </div>

</div>

        <div class="envelope-flap"></div>

    </div>

    <h2>Sana Özel Bir Mektup</h2>

    <p>
        Kalbimin içinde sadece sana ait bir mektup saklı...
    </p>

    <button id="openLetter">
        💌 Mektubu Aç
    </button>

</div>

</div>


    <script src="heart.js"></script>

</body>
</html>
